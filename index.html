<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Painel financeiro pessoal — receitas, despesas, contas, cartões, metas, planejamento, relatórios e alertas. Dados salvos no seu navegador.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#070a08">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#eef4ef">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanças">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Finanças — Painel Pessoal</title>
</head>
<style>
:root{
  --bg:#070a08; --surface:#121812; --surface-2:#18211a; --surface-3:#1e2920;
  --border:#243024; --border-soft:#1b241c;
  --ink:#eef5ee; --muted:#94a89a; --faint:#5f7266;
  --accent:#3ddc84; --accent2:#1fd0b5; --accent-dim:#2aa963; --accent-ink:#04240f;
  --good:#3ddc84; --warn:#e8b33c; --crit:#e66767;
  --rec:#008300; --des:#e66767;
  --c1:#199e70; --c2:#c98500; --c3:#008300; --c4:#9085e9; --c5:#e66767; --c6:#d55181; --c7:#d95926;
  --ok-bg:#0e2417; --ok-bd:#1d4a2c;
  --warn-bg:#2a2110; --warn-bd:#54401a;
  --crit-bg:#2a1414; --crit-bd:#5b2626;
  --tip-bg:#0c130d; --overlay:rgba(4,8,5,.72);
  --radius:16px;
  --grad:linear-gradient(135deg,#3ddc84 0%,#1fd0b5 100%);
  --grad-text:linear-gradient(120deg,#5cf29b 0%,#38e0c4 100%);
  --glass:rgba(20,29,22,.62); --glass-brd:rgba(126,158,134,.14);
  --accent-glow:rgba(61,220,132,.22);
  --shadow:0 1px 2px rgba(0,0,0,.34),0 12px 32px -18px rgba(0,0,0,.75);
  --shadow-hover:0 18px 40px -20px rgba(0,0,0,.72),0 0 0 1px var(--accent-glow);
  --glow-a:120px 120px at 12% -6%; --glow-b:160px 140px at 108% 10%;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
}
:root[data-theme="light"]{
  --bg:#eef4ef; --surface:#ffffff; --surface-2:#f3f7f3; --surface-3:#e9f0ea;
  --border:#d3ded4; --border-soft:#e3ebe4;
  --ink:#14231a; --muted:#54695c; --faint:#7d9284;
  --accent:#0b9b50; --accent2:#0aa78e; --accent-dim:#0a7a40; --accent-ink:#ffffff;
  --good:#0b8f4a; --warn:#8a5a00; --crit:#c23434;
  --rec:#008300; --des:#e34948;
  --c1:#1baf7a; --c2:#eda100; --c3:#008300; --c4:#4a3aa7; --c5:#e34948; --c6:#e87ba4; --c7:#eb6834;
  --ok-bg:#e3f4e8; --ok-bd:#b7dfc4;
  --warn-bg:#f8efd8; --warn-bd:#e6d3a2;
  --crit-bg:#fbe4e4; --crit-bd:#f0bcbc;
  --tip-bg:#ffffff; --overlay:rgba(20,30,22,.35);
  --grad:linear-gradient(135deg,#0bb85e 0%,#0aa78e 100%);
  --grad-text:linear-gradient(120deg,#0a9b50 0%,#0a9683 100%);
  --glass:rgba(255,255,255,.72); --glass-brd:rgba(18,60,34,.10);
  --accent-glow:rgba(11,155,80,.18);
  --shadow:0 1px 2px rgba(24,60,36,.06),0 14px 30px -20px rgba(24,60,36,.28);
  --shadow-hover:0 20px 40px -22px rgba(24,60,36,.34),0 0 0 1px var(--accent-glow);
}
*{box-sizing:border-box;margin:0}
html,body{color:var(--ink);font:14px/1.5 var(--sans)}
body{
  background:
    radial-gradient(var(--glow-a,140px 120px at 10% -4%),rgba(61,220,132,.14),transparent 60%),
    radial-gradient(var(--glow-b,180px 150px at 106% 8%),rgba(31,208,181,.12),transparent 60%),
    var(--bg);
  background-attachment:fixed;min-height:100vh;
}
:root[data-theme="light"] body{
  background:
    radial-gradient(600px 300px at 8% -6%,rgba(11,184,94,.10),transparent 62%),
    radial-gradient(680px 360px at 108% 6%,rgba(10,167,142,.09),transparent 60%),
    var(--bg);
  background-attachment:fixed;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes popIn{0%{transform:scale(.6)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shimmer{to{background-position:200% center}}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,select{font:inherit;color:var(--ink);background:var(--surface-3);border:1px solid var(--border);border-radius:10px;padding:8px 11px;width:100%;transition:border-color .16s,box-shadow .16s}
input:focus,select:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
::placeholder{color:var(--faint)}
h1{font-size:21px;font-weight:800;letter-spacing:-.02em;text-wrap:balance}
h2{font-size:15px;font-weight:700;letter-spacing:-.01em}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
.money{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.pos{color:var(--good)} .neg{color:var(--crit)} .warncol{color:var(--warn)}
a{color:var(--accent)}

.app{display:grid;grid-template-columns:230px minmax(0,1fr);min-height:100vh}
aside{border-right:1px solid var(--glass-brd);padding:20px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:3px;background:var(--glass);backdrop-filter:blur(14px) saturate(1.3);-webkit-backdrop-filter:blur(14px) saturate(1.3)}
.logo{display:flex;align-items:center;gap:11px;padding:4px 10px 20px}
.logo .dot{width:34px;height:34px;border-radius:11px;background:var(--grad);color:var(--accent-ink);display:grid;place-items:center;font-weight:900;font-size:15px;box-shadow:0 6px 18px -6px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.25)}
.logo b{font-size:15.5px;letter-spacing:-.01em}
.logo small{display:block;color:var(--muted);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase}
.nav-btn{position:relative;display:flex;align-items:center;gap:11px;width:100%;padding:9px 13px;border-radius:11px;color:var(--muted);font-weight:600;font-size:13.5px;text-align:left;transition:background .18s,color .18s,transform .18s}
.nav-btn:hover{background:var(--surface-2);color:var(--ink)}
.nav-btn:active{transform:scale(.97)}
.nav-btn.on{background:linear-gradient(90deg,var(--accent-glow),transparent 92%);color:var(--accent);font-weight:700}
.nav-btn.on::before{content:"";position:absolute;left:3px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:99px;background:var(--grad);box-shadow:0 0 10px var(--accent-glow)}
.nav-btn .ic{width:20px;text-align:center;transition:transform .18s}
.nav-btn:hover .ic{transform:scale(1.15)}
.badge{margin-left:auto;background:var(--crit);color:#fff;font-size:10.5px;font-weight:800;border-radius:99px;padding:1px 7px}
.side-foot{margin-top:auto;padding:10px 12px;color:var(--faint);font-size:11px}

main{padding:26px 32px 60px;max-width:1180px;width:100%;margin:0 auto}
.topbar{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:20px}
.topbar .sub{color:var(--muted);font-size:12.5px}
.month-nav{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--glass-brd);border-radius:12px;padding:4px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:var(--shadow)}
.month-nav button{padding:5px 11px;border-radius:8px;font-weight:700;color:var(--muted);transition:background .16s,color .16s,transform .16s}
.month-nav button:hover{background:var(--surface-3);color:var(--ink)}
.month-nav button:active{transform:scale(.9)}
.month-nav .cur{min-width:130px;text-align:center;font-weight:700;font-size:13.5px}
.month-nav select{width:auto;padding:5px 8px;border:0;background:var(--surface-3);font-weight:700}

.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(184px,1fr));margin-bottom:14px}
.tile{position:relative;overflow:hidden;background:var(--glass);border:1px solid var(--glass-brd);border-radius:var(--radius);padding:15px 17px 14px;box-shadow:var(--shadow);backdrop-filter:blur(12px) saturate(1.25);-webkit-backdrop-filter:blur(12px) saturate(1.25);animation:fadeUp .5s both;transition:transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .22s,border-color .22s}
.tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--accent-glow)}
.tile::after{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(120px 60px at 100% 0,var(--accent-glow),transparent 70%);opacity:0;transition:opacity .22s;pointer-events:none}
.tile:hover::after{opacity:.5}
.tile .val{font-size:22px;font-weight:800;margin-top:6px;letter-spacing:-.02em}
.tile .hint{font-size:11.5px;color:var(--muted);margin-top:3px}
.tile.hero .val{font-family:var(--sans);font-variant-numeric:tabular-nums;font-weight:800;font-size:clamp(21px,1.7vw,26px);letter-spacing:-.03em;white-space:nowrap;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.kpis .tile:nth-child(1){animation-delay:.02s}.kpis .tile:nth-child(2){animation-delay:.07s}
.kpis .tile:nth-child(3){animation-delay:.12s}.kpis .tile:nth-child(4){animation-delay:.17s}
.kpis .tile:nth-child(5){animation-delay:.22s}
.banner{border-radius:var(--radius);padding:12px 16px;font-weight:700;margin-bottom:14px;border:1px solid var(--border);animation:fadeUp .5s .1s both}
.banner.good{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--good)}
.banner.warn{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn)}
.banner.crit{background:var(--crit-bg);border-color:var(--crit-bd);color:var(--crit)}
.banner.info{background:var(--surface);border-color:var(--border);color:var(--muted);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.chip{display:flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--glass-brd);border-radius:99px;padding:6px 14px;font-size:12.5px;color:var(--muted);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:transform .18s,border-color .18s}
.chip:hover{transform:translateY(-1px);border-color:var(--accent-glow)}
.chip b{color:var(--ink);font-family:var(--mono)}
.chip.alert b{color:var(--crit)}

.card{position:relative;background:var(--glass);border:1px solid var(--glass-brd);border-radius:var(--radius);padding:17px 19px;box-shadow:var(--shadow);backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);animation:fadeUp .5s both;transition:box-shadow .22s,border-color .22s}
.card:hover{box-shadow:var(--shadow-hover)}
.card h2{margin-bottom:2px}
.card .sub{color:var(--muted);font-size:12px;margin-bottom:12px}
.charts2{grid-template-columns:5fr 7fr;margin-bottom:12px}
.svgwrap{width:100%}
svg{display:block;width:100%;height:auto}
.gridline{stroke:var(--border-soft);stroke-width:1}
.axis-t{fill:var(--faint);font-size:10px;font-family:var(--mono)}
.dlab{fill:var(--muted);font-size:10.5px;font-family:var(--mono)}
.legend{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:10px;font-size:12px;color:var(--muted)}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}
.donut-flex{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.donut-legend{flex:1;min-width:180px;display:flex;flex-direction:column;gap:6px;font-size:12.5px}
.donut-legend .row{display:flex;align-items:center;gap:8px}
.donut-legend .row .nm{color:var(--muted);flex:1}
.donut-legend .row .vl{font-family:var(--mono);font-variant-numeric:tabular-nums}
.donut-legend .row .pc{color:var(--faint);font-family:var(--mono);width:40px;text-align:right}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.toolbar select,.toolbar input{width:auto;min-width:130px}
.btn{background:var(--grad);color:var(--accent-ink);font-weight:800;padding:9px 16px;border-radius:11px;font-size:13px;box-shadow:0 8px 20px -10px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.22);transition:transform .16s,box-shadow .16s,filter .16s}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 26px -10px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.28);filter:brightness(1.04)}
.btn:active{transform:translateY(0) scale(.97)}
.btn:disabled{opacity:.55;pointer-events:none;transform:none}
.btn-ghost{background:var(--surface-3);color:var(--ink);font-weight:700;padding:9px 14px;border-radius:11px;border:1px solid var(--border);font-size:13px;transition:transform .16s,border-color .16s,background .16s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.btn-ghost:active{transform:scale(.97)}
.btn-danger{background:var(--crit-bg);color:var(--crit);border:1px solid var(--crit-bd);font-weight:700;padding:9px 14px;border-radius:11px;font-size:13px;transition:transform .16s,filter .16s}
.btn-danger:hover{filter:brightness(1.08);transform:translateY(-1px)}
.spacer{flex:1}

.tablewrap{overflow-x:auto;background:var(--glass);border:1px solid var(--glass-brd);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);animation:fadeUp .5s both}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
th{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr{transition:background .15s}
tbody tr:hover{background:var(--surface-2)}
td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;white-space:nowrap}
.rowacts{white-space:nowrap;text-align:right}
.rowacts button{padding:3px 7px;border-radius:6px;color:var(--faint);font-size:13px}
.rowacts button:hover{background:var(--surface-3);color:var(--ink)}
tr.venc-crit td:first-child{box-shadow:inset 3px 0 0 var(--crit)}
tr.venc-warn td:first-child{box-shadow:inset 3px 0 0 var(--warn)}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:2px 10px;font-size:11.5px;font-weight:700;cursor:pointer;border:1px solid transparent}
.pill.ok{background:var(--ok-bg);color:var(--good);border-color:var(--ok-bd)}
.pill.pend{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-bd)}
.pill.crit{background:var(--crit-bg);color:var(--crit);border-color:var(--crit-bd)}
.pill.neutral{background:var(--surface-3);color:var(--muted);border-color:var(--border)}
.paybtn{width:27px;height:27px;border-radius:50%;border:1.5px solid var(--ok-bd);color:var(--faint);font-size:14px;font-weight:900;display:inline-grid;place-items:center;line-height:1;transition:transform .16s,border-color .16s,color .16s}
.paybtn:hover{border-color:var(--good);color:var(--good);transform:scale(1.12)}
.paybtn:active{transform:scale(.9)}
.paybtn.on{background:var(--grad);border-color:transparent;color:var(--accent-ink);animation:popIn .3s;box-shadow:0 4px 12px -4px var(--accent-glow)}
.meter{height:8px;border-radius:99px;background:var(--surface-3);overflow:hidden;min-width:70px}
.meter i{display:block;height:100%;border-radius:99px;background:var(--grad);transition:width .8s cubic-bezier(.2,.8,.2,1)}
.meter.m-warn i{background:var(--warn)} .meter.m-crit i{background:var(--crit)}

.cards3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.acct .big{font-size:22px;font-weight:800;margin:6px 0 2px}
.acct .mini{display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin-top:8px}
.acct .mini b{display:block;font-family:var(--mono);font-size:12.5px}
.cardtop{display:flex;align-items:flex-start;gap:10px}
.cardtop .rowacts{margin-left:auto}
.meta-card .pv{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;font-size:12px;color:var(--muted)}
.kv{display:grid;grid-template-columns:auto 1fr;gap:3px 14px;font-size:12.5px;margin-top:10px}
.kv span{color:var(--muted)} .kv b{font-family:var(--mono);text-align:right}

.section-title{display:flex;align-items:baseline;gap:10px;margin:26px 0 10px}
.section-title .sub{color:var(--muted);font-size:12px}

.overlay{position:fixed;inset:0;background:var(--overlay);display:none;place-items:center;z-index:50;padding:18px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.overlay.open{display:grid;animation:fadeUp .2s}
.modal{background:var(--surface-2);border:1px solid var(--glass-brd);border-radius:18px;padding:22px;width:min(430px,100%);max-height:90vh;overflow:auto;box-shadow:0 30px 70px -24px rgba(0,0,0,.6);animation:modalIn .28s cubic-bezier(.2,.9,.3,1.1)}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}
.modal h2{margin-bottom:14px}
.modal .field{margin-bottom:11px}
.modal label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.f-half{display:grid;grid-template-columns:1fr 1fr;gap:10px}

#tip{position:fixed;pointer-events:none;background:var(--tip-bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;z-index:60;display:none;max-width:240px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
#tip b{font-family:var(--mono)}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px) scale(.96);background:var(--grad);color:var(--accent-ink);font-weight:800;padding:10px 20px;border-radius:99px;opacity:0;transition:.28s cubic-bezier(.2,.9,.3,1.2);z-index:70;pointer-events:none;box-shadow:0 12px 30px -10px var(--accent-glow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

.bar-rect{transform:scaleY(0);transform-origin:bottom;transform-box:fill-box;transition:transform .7s cubic-bezier(.2,.8,.2,1)}
.go .bar-rect{transform:scaleY(1)}
.linepath{stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset 1.1s ease}
.go .linepath{stroke-dashoffset:0}
.areapath{opacity:0;transition:opacity .8s ease .3s}
.go .areapath{opacity:1}
.arc{transition:stroke-dasharray .9s cubic-bezier(.2,.8,.2,1)}
.hband{fill:transparent}
.hband:hover{fill:rgba(61,220,132,.06)}

.empty{padding:26px;text-align:center;color:var(--faint)}
.chiplist{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0 12px}
.chiplist .chip button{color:var(--faint);font-weight:800}
.chiplist .chip button:hover{color:var(--crit)}
.addrow{display:flex;gap:8px;max-width:340px}

/* ---- app no celular: barra inferior + folha "Mais" ---- */
.tabbar{display:none}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:12px;color:var(--muted);font-size:10.5px;font-weight:700;position:relative;transition:color .15s,transform .12s}
.tab .ic{font-size:21px;line-height:1;transition:transform .18s}
.tab.on{color:var(--accent)}
.tab.on .ic{transform:translateY(-1px) scale(1.08)}
.tab:active{transform:scale(.9)}
.tab .badge{position:absolute;top:1px;left:calc(50% + 4px);margin:0}
.sheet-scrim{position:fixed;inset:0;background:var(--overlay);opacity:0;pointer-events:none;transition:opacity .25s;z-index:80;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.sheet-scrim.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:81;background:var(--surface-2);border-radius:22px 22px 0 0;border-top:1px solid var(--glass-brd);padding:6px 14px calc(20px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .3s cubic-bezier(.2,.9,.3,1);box-shadow:0 -24px 50px -20px rgba(0,0,0,.55);max-height:84vh;overflow:auto}
.sheet.open{transform:none}
.sheet .grip{width:40px;height:4px;border-radius:99px;background:var(--faint);opacity:.5;margin:8px auto 14px}
.sheet h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin:4px 4px 10px}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sheet-item{display:flex;align-items:center;gap:11px;padding:14px 13px;border-radius:14px;background:var(--surface-3);border:1px solid var(--glass-brd);color:var(--ink);font-weight:600;font-size:14px;text-align:left;width:100%;transition:transform .12s}
.sheet-item .ic{font-size:18px;width:22px;text-align:center}
.sheet-item.on{background:linear-gradient(90deg,var(--accent-glow),transparent);color:var(--accent);border-color:var(--accent-glow)}
.sheet-item .badge{margin-left:auto}
.sheet-item:active{transform:scale(.96)}

@media (max-width:900px){
  .app{display:block}
  aside{display:none}
  .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:60;justify-content:space-around;gap:2px;
    background:var(--glass);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
    border-top:1px solid var(--glass-brd);padding:7px 6px calc(7px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 30px -18px rgba(0,0,0,.6)}
  main{padding:0 14px calc(84px + env(safe-area-inset-bottom))}
  .topbar{position:sticky;top:0;z-index:40;margin:0 -14px 16px;padding:calc(10px + env(safe-area-inset-top)) 14px 12px;
    background:var(--glass);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);
    border-bottom:1px solid var(--glass-brd);gap:10px}
  h1{font-size:19px}
  .charts2{grid-template-columns:1fr}
  .month-nav{margin-left:auto;padding:3px}
  .month-nav .cur{min-width:96px;font-size:12.5px}
}

<script>
(()=>{'use strict';
/* ============================== base ============================== */
const $=s=>document.querySelector(s);
const LS='financas_site_v2';
const THEME_KEY='financas_theme';
const BRL=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const fmt=v=>BRL.format(v||0);
const fmtK=v=>Math.abs(v)>=1000?(v/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+' mil':String(Math.round(v));
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MABR=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const PAL=['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)'];
const uid=()=>(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(16).slice(2));
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pad=n=>String(n).padStart(2,'0');
const iso=(y,m,d)=>`${y}-${pad(m)}-${pad(d)}`;
const hoje=new Date(); hoje.setHours(0,0,0,0);
const hojeISO=iso(hoje.getFullYear(),hoje.getMonth()+1,hoje.getDate());
const dISO=s=>{const[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c)};
const fdate=s=>s?s.split('-').reverse().join('/'):'—';
const inMonth=(s,y,m)=>!!s&&s.startsWith(`${y}-${pad(m)}`);
const inYear=(s,y)=>!!s&&s.startsWith(`${y}-`);
const addMonths=(y,m,n)=>{const t=(y*12+m-1)+n;return{y:Math.floor(t/12),m:t%12+1}};
const clampDay=(y,m,d)=>iso(y,m,Math.min(d,new Date(y,m,0).getDate()));
const soma=(arr,f)=>arr.reduce((a,x)=>a+(f?f(x):x),0);

/* ============================== dados ============================== */
function emptyDB(){
  const listas={
    catRec:['Receita fixa','Salário','Freelance','Investimentos','Vendas','Aluguel','Reembolso','Outros'],
    catDes:['Despesa fixa','Moradia','Alimentação','Transporte','Saúde','Educação','Lazer','Vestuário','Assinaturas','Contas Fixas','Investimentos','Outros'],
    formas:['Dinheiro','Pix','Débito','Crédito','Boleto','Transferência']
  };
  return {receitas:[],despesas:[],contas:[],transfers:[],cartoes:[],metas:[],
          orcamentos:Object.fromEntries(listas.catDes.map(c=>[c,0])),listas};
}
function seed(){
  const db=emptyDB();
  db.contas=[{id:uid(),nome:'Itaú',saldoInicial:2500},{id:uid(),nome:'Nubank',saldoInicial:1200},
             {id:uid(),nome:'Caixa',saldoInicial:800},{id:uid(),nome:'Inter',saldoInicial:300},
             {id:uid(),nome:'Carteira',saldoInicial:150}];
  db.cartoes=[{id:uid(),nome:'Nubank',limite:4500,fechamento:28,vencimento:5},
              {id:uid(),nome:'Itaú',limite:6000,fechamento:25,vencimento:3},
              {id:uid(),nome:'Inter',limite:2000,fechamento:20,vencimento:27}];
  db.metas=[{id:uid(),nome:'Reserva de emergência',alvo:15000,guardado:8200,aporte:600},
            {id:uid(),nome:'Viagem de férias',alvo:6000,guardado:2100,aporte:400},
            {id:uid(),nome:'Notebook novo',alvo:4500,guardado:4500,aporte:0},
            {id:uid(),nome:'Entrada do apartamento',alvo:40000,guardado:5500,aporte:800}];
  db.orcamentos={Moradia:1900,'Alimentação':900,Transporte:350,'Saúde':250,'Educação':150,Lazer:250,
                 'Vestuário':150,Assinaturas:120,'Contas Fixas':400,Investimentos:600,Outros:700};
  const Y=hoje.getFullYear(),M=hoje.getMonth()+1;
  const mercado=[620,580,710,650,690,720,680],energia=[175,182,160,150,140,135,148],
        combust=[240,220,260,230,250,270,90],restau=[180,210,150,240,190,260,120],
        freela=[[0,800],[2,1200],[4,950]],divid=[130,145,150,138,160,155];
  const R=(data,desc,cat,valor,forma,conta,status)=>db.receitas.push({id:uid(),data,desc,cat,valor,forma,conta,status});
  const D=(data,desc,cat,valor,forma,cartao,parcelas,venc,pago,conta)=>db.despesas.push({id:uid(),data,desc,cat,valor,forma,cartao,parcelas,venc,pago,conta});
  for(let i=0;i<7;i++){                       // 7 meses: i=6 é o mês atual
    const {y,m}=addMonths(Y,M,i-6), atual=i===6, pago=!atual;
    const prox=addMonths(y,m,1);
    R(clampDay(y,m,5),'Salário mensal','Salário',4800,'Transferência','Itaú','Recebido');
    if(i>0) R(clampDay(y,m,10),'Dividendos de FIIs','Investimentos',divid[i-1],'Transferência','Inter','Recebido');
    const fx=freela.find(f=>f[0]===i); if(fx) R(clampDay(y,m,15),'Projeto freelance','Freelance',fx[1],'Pix','Nubank','Recebido');
    if(atual) R(clampDay(y,m,20),'Manutenção de site','Freelance',600,'Pix','Nubank','Pendente');
    D(clampDay(y,m,1),'Aluguel + condomínio','Moradia',1500,'Boleto','','',clampDay(y,m,10),pago,'Itaú');
    D(clampDay(y,m,12),'Supermercado do mês','Alimentação',mercado[i],'Crédito','Nubank','',clampDay(prox.y,prox.m,5),pago,'Nubank');
    D(clampDay(y,m,3),'Energia elétrica','Contas Fixas',energia[i],'Pix','','',clampDay(y,m,8),pago,'Itaú');
    D(clampDay(y,m,13),'Internet fibra','Contas Fixas',100,'Débito','','',clampDay(y,m,15),pago,'Itaú');
    D(clampDay(y,m,10),'Plano de celular','Contas Fixas',60,'Débito','','',clampDay(y,m,12),pago,'Nubank');
    D(clampDay(y,m,4),'Academia','Saúde',90,'Débito','','',clampDay(y,m,5),pago,'Nubank');
    D(clampDay(y,m,6),'Streaming (Netflix + Spotify)','Assinaturas',55,'Crédito','Nubank','',clampDay(prox.y,prox.m,5),pago,'Nubank');
    D(clampDay(y,m,16),'Combustível','Transporte',combust[i],'Crédito','Itaú','',clampDay(prox.y,prox.m,3),pago,'Itaú');
    D(clampDay(y,m,22),'Restaurantes e delivery','Lazer',restau[i],'Crédito','Nubank','',clampDay(prox.y,prox.m,5),pago,'Nubank');
    if(!atual) D(clampDay(y,m,6),'Aporte em investimentos','Investimentos',500,'Transferência','','',clampDay(y,m,6),true,'Itaú');
    if(i>=1){const k=i;D(clampDay(y,m,1),`Notebook Dell (${k}/12)`,'Outros',300,'Crédito','Itaú','12x',clampDay(prox.y,prox.m,3),pago,'Itaú');}
    if(i>=4){const k=i-3;D(clampDay(y,m,2),`Smartphone (${k}/10)`,'Outros',240,'Crédito','Nubank','10x',clampDay(prox.y,prox.m,5),pago,'Nubank');}
  }
  const back=n=>addMonths(Y,M,-n);
  const b6=back(6),b5=back(5),b4=back(4),b3=back(3),b2=back(2),b1=back(1);
  D(clampDay(b6.y,b6.m,20),'Roupas de trabalho','Vestuário',180,'Crédito','Itaú','',clampDay(b5.y,b5.m,3),true,'Itaú');
  D(clampDay(b5.y,b5.m,9),'IPVA — parcela única','Transporte',310,'Boleto','','',clampDay(b5.y,b5.m,15),true,'Itaú');
  D(clampDay(b4.y,b4.m,14),'Consulta médica','Saúde',150,'Pix','','',clampDay(b4.y,b4.m,14),true,'Nubank');
  D(clampDay(b3.y,b3.m,2),'Curso online de inglês','Educação',120,'Crédito','Nubank','',clampDay(b2.y,b2.m,5),true,'Nubank');
  D(clampDay(b2.y,b2.m,25),'Tênis de corrida','Vestuário',220,'Crédito','Inter','',clampDay(b1.y,b1.m,27),true,'Inter');
  D(clampDay(b1.y,b1.m,18),'Presente de aniversário','Outros',130,'Pix','','',clampDay(b1.y,b1.m,18),true,'Nubank');
  D(clampDay(Y,M,1),'Cinema com amigos','Lazer',65,'Débito','','',clampDay(Y,M,1),true,'Nubank');
  const px=addMonths(Y,M,1);
  D(clampDay(Y,M,2),'Ingresso de show','Lazer',120,'Crédito','Nubank','',clampDay(px.y,px.m,5),false,'Nubank');
  db.transfers=[{id:uid(),data:clampDay(b2.y,b2.m,10),de:'Nubank',para:'Carteira',valor:200,obs:'Dinheiro da semana'},
                {id:uid(),data:clampDay(b1.y,b1.m,15),de:'Itaú',para:'Nubank',valor:400,obs:'Cobrir fatura'},
                {id:uid(),data:clampDay(Y,M,1),de:'Itaú',para:'Inter',valor:300,obs:'Investimento'}];
  return db;
}
function stripSamples(d){
  const SD=new Set(['Salário mensal','Dividendos de FIIs','Projeto freelance','Manutenção de site',
    'Aluguel + condomínio','Supermercado do mês','Energia elétrica','Internet fibra','Plano de celular',
    'Academia','Streaming (Netflix + Spotify)','Combustível','Restaurantes e delivery','Aporte em investimentos',
    'Roupas de trabalho','IPVA — parcela única','Consulta médica','Curso online de inglês','Tênis de corrida',
    'Presente de aniversário','Cinema com amigos','Ingresso de show']);
  d.receitas=(d.receitas||[]).filter(r=>!SD.has(r.desc));
  d.despesas=(d.despesas||[]).filter(x=>!SD.has(x.desc)&&!/^Notebook Dell \(\d+\/12\)$/.test(x.desc||'')&&!/^Smartphone \(\d+\/10\)$/.test(x.desc||''));
  const SO=new Set(['Dinheiro da semana','Cobrir fatura','Investimento']);
  d.transfers=(d.transfers||[]).filter(t=>!SO.has(t.obs));
  const SC={'Itaú':2500,'Nubank':1200,'Caixa':800,'Inter':300,'Carteira':150};
  d.contas=(d.contas||[]).filter(c=>SC[c.nome]!==c.saldoInicial);
  const SK={'Nubank':4500,'Itaú':6000,'Inter':2000};
  d.cartoes=(d.cartoes||[]).filter(c=>SK[c.nome]!==c.limite);
  const SM={'Reserva de emergência':15000,'Viagem de férias':6000,'Notebook novo':4500,'Entrada do apartamento':40000};
  d.metas=(d.metas||[]).filter(m=>SM[m.nome]!==m.alvo);
  const SB={Moradia:1900,'Alimentação':900,Transporte:350,'Saúde':250,'Educação':150,Lazer:250,'Vestuário':150,Assinaturas:120,'Contas Fixas':400,Investimentos:600,Outros:700};
  d.orcamentos=d.orcamentos||{};
  for(const k in SB) if(d.orcamentos[k]===SB[k]) d.orcamentos[k]=0;
  return d;
}
function load(){
  try{
    const s=localStorage.getItem(LS);
    if(s) return JSON.parse(s);
    const v1=localStorage.getItem('financas_site_v1');
    if(v1){const d=stripSamples(JSON.parse(v1));localStorage.removeItem('financas_site_v1');return d}
    return null;
  }catch(e){return null}
}
function save(bump=true){
  if(bump){db._rev=Date.now();try{scheduleSync()}catch(_){/* módulo de sync ainda não carregou */}}
  try{localStorage.setItem(LS,JSON.stringify(db))}catch(e){}
}
const CAT_FIXA_REC='Receita fixa', CAT_FIXA_DES='Despesa fixa';
function normalize(d){
  d.fixasExcluidas=d.fixasExcluidas||[];
  d.listas=d.listas||emptyDB().listas;
  if(!d.listas.catRec.includes(CAT_FIXA_REC))d.listas.catRec.unshift(CAT_FIXA_REC);
  if(!d.listas.catDes.includes(CAT_FIXA_DES))d.listas.catDes.unshift(CAT_FIXA_DES);
  d.orcamentos=d.orcamentos||{};
  if(d.orcamentos[CAT_FIXA_DES]==null)d.orcamentos[CAT_FIXA_DES]=0;
  return d;
}
let db=normalize(load()||emptyDB()); save();
try{
  const t=localStorage.getItem(THEME_KEY)||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');
  document.documentElement.dataset.theme=t;
}catch(_){document.documentElement.dataset.theme='dark'}
let sel={y:hoje.getFullYear(),m:hoje.getMonth()+1};
let view='dash';
let filtros={recCat:'',recStatus:'',recConta:'',desCat:'',desPago:'',desCartao:'',todosMeses:false,todosMesesR:false};

/* ============================== cálculo ============================== */
const recDo=(y,m)=>db.receitas.filter(r=>inMonth(r.data,y,m));
const desDo=(y,m)=>db.despesas.filter(d=>inMonth(d.data,y,m));
const totRec=(y,m)=>soma(recDo(y,m),r=>r.valor);
const totDes=(y,m)=>soma(desDo(y,m),d=>d.valor);
function saldoConta(nome){
  const ini=db.contas.find(c=>c.nome===nome)?.saldoInicial||0;
  const ent=soma(db.receitas.filter(r=>r.conta===nome&&r.status==='Recebido'),r=>r.valor);
  const sai=soma(db.despesas.filter(d=>d.conta===nome&&d.pago),d=>d.valor);
  const tin=soma(db.transfers.filter(t=>t.para===nome),t=>t.valor);
  const tout=soma(db.transfers.filter(t=>t.de===nome),t=>t.valor);
  return {ini,ent,sai,tin,tout,atual:ini+ent-sai+tin-tout};
}
const saldoTotal=()=>soma(db.contas,c=>saldoConta(c.nome).atual);
const fatura=nome=>soma(db.despesas.filter(d=>d.cartao===nome&&d.forma==='Crédito'&&!d.pago),d=>d.valor);
function gastoCat(cat,y,m){return soma(db.despesas.filter(d=>d.cat===cat&&inMonth(d.data,y,m)),d=>d.valor)}
function alertas(){
  const est=db.listas.catDes.map(c=>({cat:c,orc:db.orcamentos[c]||0,gasto:gastoCat(c,sel.y,sel.m)}))
    .filter(x=>x.orc>0&&x.gasto>x.orc);
  const lim=new Date(hoje); lim.setDate(lim.getDate()+7);
  const limISO=iso(lim.getFullYear(),lim.getMonth()+1,lim.getDate());
  const aberto=db.despesas.filter(d=>!d.pago&&d.venc);
  const vencidas=aberto.filter(d=>d.venc<hojeISO).sort((a,b)=>a.venc<b.venc?-1:1);
  const vencer=aberto.filter(d=>d.venc>=hojeISO&&d.venc<=limISO).sort((a,b)=>a.venc<b.venc?-1:1);
  const metasOk=db.metas.filter(m=>m.alvo>0&&m.guardado>=m.alvo);
  return {est,vencidas,vencer,metasOk,total:est.length+vencidas.length+vencer.length};
}
function parcelamentos(){
  const g={};
  db.despesas.forEach(d=>{
    const m=/^(.*)\s\((\d+)\/(\d+)\)$/.exec(d.desc||'');
    if(!m)return;
    const k=m[1]+'|'+(d.cartao||'');
    (g[k]=g[k]||{desc:m[1],cartao:d.cartao||'—',n:+m[3],vparc:d.valor,pagas:0,lanc:0});
    g[k].lanc++; if(d.pago)g[k].pagas++;
    g[k].vparc=d.valor; g[k].n=+m[3];
  });
  return Object.values(g).map(p=>({...p,total:p.vparc*p.n,falta:p.vparc*(p.n-p.pagas)}));
}

/* ============================== svg charts ============================== */
function svgBars(pairs,labels,W=680,H=250){
  const P={t:16,r:8,b:26,l:46}, pw=W-P.l-P.r, ph=H-P.t-P.b;
  const max=Math.max(100,...pairs.flat())*1.12;
  const gw=pw/pairs.length, bw=Math.min(16,(gw-10)/2);
  const ry=v=>P.t+ph*(1-v/max);
  let g='',bars='',hb='';
  for(let i=0;i<=4;i++){const y=P.t+ph*i/4;
    g+=`<line class="gridline" x1="${P.l}" x2="${W-P.r}" y1="${y}" y2="${y}"/>`+
       `<text class="axis-t" x="${P.l-6}" y="${y+3}" text-anchor="end">${fmtK(max*(1-i/4))}</text>`;}
  pairs.forEach((pr,i)=>{
    const cx=P.l+gw*i+gw/2;
    const x1=cx-bw-1, x2=cx+1;
    [[x1,pr[0],'var(--rec)'],[x2,pr[1],'var(--des)']].forEach(([x,v,col],k)=>{
      const h=Math.max(0,ph*v/max), y=P.t+ph-h, r=Math.min(4,h/2);
      if(h>0)bars+=`<path class="bar-rect" style="transition-delay:${i*35}ms" fill="${col}" d="M${x},${y+h} v${-(h-r)} q0,${-r} ${r},${-r} h${bw-2*r} q${r},0 ${r},${r} v${h-r} z"/>`;
    });
    bars+=`<text class="axis-t" x="${cx}" y="${H-8}" text-anchor="middle">${labels[i]}</text>`;
    hb+=`<rect class="hband" x="${P.l+gw*i}" y="${P.t}" width="${gw}" height="${ph}" data-tt="${esc(labels[i]+'|Receitas: '+fmt(pr[0])+'|Despesas: '+fmt(pr[1]))}"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Receitas e despesas por mês">${g}${bars}${hb}</svg>`;
}
function svgLine(vals,labels,W=980,H=230){
  const P={t:14,r:14,b:26,l:56}, pw=W-P.l-P.r, ph=H-P.t-P.b;
  const mx=Math.max(...vals), mn=Math.min(...vals,0);
  const span=(mx-mn)||1, top=mx+span*.1, bot=mn<0?mn-span*.05:0;
  const X=i=>P.l+pw*i/(vals.length-1), Y=v=>P.t+ph*(top-v)/(top-bot);
  let g='';
  for(let i=0;i<=3;i++){const y=P.t+ph*i/3, v=top-(top-bot)*i/3;
    g+=`<line class="gridline" x1="${P.l}" x2="${W-P.r}" y1="${y}" y2="${y}"/>`+
       `<text class="axis-t" x="${P.l-6}" y="${y+3}" text-anchor="end">${fmtK(v)}</text>`;}
  const pts=vals.map((v,i)=>`${X(i)},${Y(v)}`);
  const dArea=`M${pts[0]} L${pts.join(' L')} L${X(vals.length-1)},${P.t+ph} L${X(0)},${P.t+ph} Z`;
  let lbl='',hb='';
  vals.forEach((v,i)=>{lbl+=`<text class="axis-t" x="${X(i)}" y="${H-8}" text-anchor="middle">${labels[i]}</text>`;
    hb+=`<rect class="hband" x="${X(i)-pw/(vals.length-1)/2}" y="${P.t}" width="${pw/(vals.length-1)}" height="${ph}" data-tt="${esc(labels[i]+'|Patrimônio: '+fmt(v))}"/>`;});
  const last=vals.length-1;
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Evolução do patrimônio">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--accent)" stop-opacity=".28"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${g}<path class="areapath" d="${dArea}" fill="url(#ga)"/>
    <path class="linepath" pathLength="1" d="M${pts.join(' L')}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(last)}" cy="${Y(vals[last])}" r="4.5" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>
    <text class="dlab" x="${X(last)-6}" y="${Y(vals[last])-10}" text-anchor="end" fill="var(--ink)">${fmtK(vals[last])}</text>
    ${lbl}${hb}</svg>`;
}
function donutHTML(slices){
  const total=soma(slices,s=>s.v);
  if(total<=0)return '<div class="empty">Sem despesas neste mês.</div>';
  const R=64,C=2*Math.PI*R,GAP=2;
  let off=C/4, arcs='';
  slices.forEach(s=>{
    const len=Math.max(0,C*s.v/total-GAP);
    arcs+=`<circle class="arc" data-len="${len.toFixed(2)} ${(C-len).toFixed(2)}" cx="90" cy="90" r="${R}" fill="none" stroke="${s.c}" stroke-width="26" stroke-dasharray="0 ${C.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" data-tt="${esc(s.nm+'|'+fmt(s.v)+' ('+Math.round(100*s.v/total)+'%)')}"/>`;
    off-=C*s.v/total;
  });
  const legend=slices.map(s=>`<div class="row"><span class="sw" style="background:${s.c}"></span><span class="nm">${esc(s.nm)}</span><span class="vl">${fmt(s.v)}</span><span class="pc">${Math.round(100*s.v/total)}%</span></div>`).join('');
  return `<div class="donut-flex"><svg viewBox="0 0 180 180" style="max-width:190px" role="img" aria-label="Gastos por categoria">${arcs}
    <text x="90" y="85" text-anchor="middle" fill="var(--muted)" font-size="9.5" letter-spacing=".08em">TOTAL</text>
    <text x="90" y="102" text-anchor="middle" fill="var(--ink)" font-size="14" font-weight="800" font-family="var(--mono)">${fmtK(total)}</text></svg>
    <div class="donut-legend">${legend}</div></div>`;
}
function hbarsHTML(items,color){
  const max=Math.max(1,...items.map(i=>i.v));
  return items.map(i=>`
    <div style="display:grid;grid-template-columns:130px 1fr 90px;gap:10px;align-items:center;margin-bottom:7px">
      <span style="color:var(--muted);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.nm)}</span>
      <div class="meter" style="height:9px"><i style="width:0" data-w="${(100*i.v/max).toFixed(1)}%" ${color?`data-c="${color}"`:''}></i></div>
      <span class="money" style="text-align:right;font-size:12.5px">${fmt(i.v)}</span>
    </div>`).join('');
}
function catSlices(y,m){
  const anoTot={}; db.listas.catDes.forEach(c=>anoTot[c]=soma(db.despesas.filter(d=>d.cat===c&&inYear(d.data,y)),d=>d.valor));
  const ordem=[...db.listas.catDes].sort((a,b)=>anoTot[b]-anoTot[a]);
  const top=ordem.slice(0,6), resto=ordem.slice(6);
  const out=[];
  top.forEach((c,i)=>{const v=gastoCat(c,y,m); if(v>0)out.push({nm:c,v,c:PAL[i]})});
  const vout=soma(resto,c=>gastoCat(c,y,m));
  if(vout>0)out.push({nm:'Outras',v:vout,c:PAL[6]});
  return out.sort((a,b)=>b.v-a.v);
}

function openForm(titulo,fields,initial,onOk){
  const ov=$('#overlay'),md=$('#modal');
  md.innerHTML=`<h2>${esc(titulo)}</h2><form id="mform">${fields.map(f=>{
    const v=initial?.[f.k]??f.def??'';
    if(f.type==='select')return `<div class="field"><label>${f.lb}</label><select name="${f.k}">${f.opts.map(o=>`<option value="${esc(o)}" ${String(v)===String(o)?'selected':''}>${esc(o)||'—'}</option>`).join('')}</select></div>`;
    return `<div class="field"><label>${f.lb}</label><input name="${f.k}" type="${f.type||'text'}" value="${esc(v)}" ${f.type==='number'?'step="0.01" inputmode="decimal"':''} ${f.min!=null?`min="${f.min}"`:''} ${f.req===false?'':'required'} ${f.ph?`placeholder="${esc(f.ph)}"`:''}></div>`;
  }).join('')}<div class="actions"><button type="button" class="btn-ghost" data-act="modal-close">Cancelar</button><button type="submit" class="btn">Salvar</button></div></form>`;
  ov.classList.add('open');
  md.querySelector('input,select')?.focus();
  $('#mform').onsubmit=e=>{e.preventDefault();
    const o={}; new FormData(e.target).forEach((val,k)=>o[k]=val);
    fields.forEach(f=>{if(f.type==='number')o[f.k]=parseFloat(o[f.k]||0)||0});
    ov.classList.remove('open'); onOk(o); };
}

async function spaceId(pass){
  const s='financas-sync-v1:'+pass;
  try{
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(_){ // contexto não seguro (ex.: abrir via file://) — hash de reserva
    let h=0x811c9dc5>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}
    return 'fnv'+h.toString(16).padStart(8,'0');
  }
}
async function sbRpc(fn,body){
  const h={apikey:sync.key,Authorization:'Bearer '+sync.key,'Content-Type':'application/json'};
  const r=await fetch(sync.url+'/rest/v1/rpc/'+fn,{method:'POST',headers:h,body:JSON.stringify(body)});
  const tx=await r.text();
  if(!r.ok){
    if(/PGRST202|find the function|does not exist|schema cache|sync_pull|sync_push/i.test(tx))
      throw new Error('as funções de sincronização ainda não existem — abra o SQL Editor do Supabase e execute o SQL (botão “copiar SQL”)');
    throw new Error('Supabase '+r.status+': '+tx.slice(0,140));
  }
  return tx?JSON.parse(tx):null;
}

async function pullNow(){

  const rem=rows&&rows[0];

    else await pushNow();
    if(!silent)toast(adotou?'☁️ Dados recebidos de outro aparelho':'☁️ Sincronizado');
  }catch(e){sync.lastMsg='⚠️ '+e.message;saveSync();paintSyncStatus();if(!silent)toast('⚠️ '+e.message)}
}
let syncTimer=null;
function scheduleSync(){if(!logged())return;clearTimeout(syncTimer);syncTimer=setTimeout(pushNow,1500)}
function syncStatusText(){
  if(!logged())return 'desconectado';
  const t=sync.lastAt?new Date(sync.lastAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
  return (sync.lastMsg||'aguardando')+(t?' · '+t:'');
}
function paintSyncStatus(){const el=document.getElementById('sync-status');if(el)el.textContent=syncStatusText()}
function syncMsg(txt,ok){const el=document.getElementById('sb-msg');if(!el)return;
  el.textContent=txt||'';el.style.display=txt?'block':'none';el.style.color=ok?'var(--good)':'var(--crit)'}
async function adminLogin(){
  const pass=(document.getElementById('sb-pass')||{value:''}).value;
  if(!pass||pass.length<6){syncMsg('A senha precisa ter pelo menos 6 caracteres.');return}
  const lock=v=>document.querySelectorAll('[data-act="sync-login"]').forEach(b=>b.disabled=v);
  lock(true);syncMsg('Conectando…',true);
  try{
    sync.space=await spaceId(pass);
    const rows=await sbRpc('sync_pull',{p_space:sync.space});
    const rem=rows&&rows[0];
    if(rem&&rem.doc){
      db=normalize(rem.doc);db._rev=rem.updated_ms||0;save(false);
      sync.lastAt=Date.now();sync.lastMsg='☁️ recebido';saveSync();
      render();toast('Conectado! Dados da nuvem carregados neste aparelho.');
    }else{
      saveSync();await pushNow();
      render();toast('Conectado! Sincronização ativada com esta senha.');
    }
  }catch(e){delete sync.space;
    const m=/failed to fetch|networkerror|load failed|connectionfailed/i.test(e.message)
      ?'Sem conexão com o servidor — verifique sua internet e tente de novo.':e.message;
    syncMsg('⚠️ '+m)}
  finally{lock(false)}
}
function syncCard(){
  if(!logged())return `
  <div class="card" style="margin-top:12px"><h2>☁️ Sincronizar entre dispositivos</h2>
    <div class="sub">defina uma <b>senha administrativa</b> — digite a MESMA senha em cada aparelho para os dados se encontrarem na nuvem</div>
    <div style="max-width:340px;margin:12px 0 10px">
      <div class="eyebrow" style="margin-bottom:4px">Senha administrativa</div>
      <input id="sb-pass" type="password" autocomplete="off" placeholder="mínimo 6 caracteres">
    </div>
    <div id="sb-msg" style="display:none;font-size:12.5px;line-height:1.6;margin:0 0 10px;max-width:560px"></div>
    <div class="toolbar" style="margin:0">
      <button class="btn" data-act="sync-login">Entrar / Ativar</button>
      <span class="spacer"></span>
      <button class="btn-ghost" data-act="sync-sql-copy" style="padding:4px 10px;font-size:11px">copiar SQL</button>
    </div>
    <p style="font-size:11.5px;color:var(--faint);margin:12px 0 0;line-height:1.6">A senha é a chave dos seus dados — <b>anote em lugar seguro</b>. Sem ela não dá para recuperar o que está na nuvem (mas você sempre pode exportar um backup em Ajustes). O SQL só precisa ser executado <b>uma vez</b> no seu projeto Supabase.</p>
  </div>`;
  return `
  <div class="card" style="margin-top:12px"><h2>☁️ Sincronizar entre dispositivos</h2>
    <div class="sub">✅ conectado (modo administrador) · <span id="sync-status">${esc(syncStatusText())}</span></div>
    <p style="font-size:12.5px;color:var(--muted);margin:10px 0">As alterações são enviadas sozinhas ao editar e buscadas ao abrir o app. Em conflito, vale a versão mais recente. Digite a mesma senha em outro aparelho para ver estes dados lá.</p>
    <div class="toolbar" style="margin:0">
      <button class="btn" data-act="sync-now">Sincronizar agora</button>
      <button class="btn-ghost" data-act="sync-logout">Sair deste aparelho</button>
    </div>
  </div>`;
}
/* ============================== render / eventos ============================== */
const ymNum=t=>{const[a,b]=t.split('-').map(Number);return a*12+b-1};
function ensureFixas(){
  let criou=false;
  const alvo=sel.y*12+sel.m-1;
  const gen=(arr,cat,make)=>{
    arr.filter(x=>x.cat===cat&&!x.fixaDe&&x.data).forEach(o=>{
      for(let t=ymNum(o.data)+1;t<=alvo;t++){
        const y=Math.floor(t/12), m=t%12+1;
        if(db.fixasExcluidas.includes(o.id+'|'+y+'-'+pad(m)))continue;
        if(arr.some(x=>x.fixaDe===o.id&&inMonth(x.data,y,m)))continue;
        arr.push(make(o,y,m));criou=true;
      }
    });
  };
  gen(db.receitas,CAT_FIXA_REC,(o,y,m)=>({id:uid(),fixaDe:o.id,data:clampDay(y,m,+o.data.slice(8)),
    desc:o.desc,cat:o.cat,valor:o.valor,forma:o.forma,conta:o.conta,status:'Pendente'}));
  gen(db.despesas,CAT_FIXA_DES,(o,y,m)=>{
    let venc='';
    if(o.venc){const off=ymNum(o.venc)-ymNum(o.data),t2=y*12+m-1+off;
      venc=clampDay(Math.floor(t2/12),t2%12+1,+o.venc.slice(8));}
    return {id:uid(),fixaDe:o.id,data:clampDay(y,m,+o.data.slice(8)),desc:o.desc,cat:o.cat,
      valor:o.valor,forma:o.forma,cartao:o.cartao,parcelas:o.parcelas,venc,pago:false,conta:o.conta};
  });
  if(criou)save();
}
function renderNav(){
  const n=alertas().total;
  const theme=document.documentElement.dataset.theme;
  $('#sidenav').innerHTML=`<div class="logo"><span class="dot">R$</span><div><b>Finanças</b><small>painel pessoal</small></div></div>`+
    NAVS.map(([id,ic,lb])=>`<button class="nav-btn ${view===id?'on':''}" data-view="${id}"><span class="ic">${ic}</span>${lb}${id==='ale'&&n?`<span class="badge">${n}</span>`:''}</button>`).join('')+
    `<button class="nav-btn" data-act="theme" style="margin-top:8px">`+
      (theme==='light'?'<span class="ic">🌙</span>Modo escuro':'<span class="ic">☀️</span>Modo claro')+
    `</button>`+
    `<div class="side-foot">${logged()?'☁️ Sincronizado na nuvem':'Dados salvos neste navegador.'}<br>${logged()?esc(syncStatusText()):'Faça backup em Ajustes.'}</div>`;
  // barra inferior (celular)
  const moreActive=!TABS.includes(view);
  $('#tabbar').innerHTML=
    TABS.map(id=>`<button class="tab ${view===id?'on':''}" data-view="${id}"><span class="ic">${EMO[id]}</span>${TITLES[id][0]}</button>`).join('')+
    `<button class="tab ${moreActive?'on':''}" data-act="more"><span class="ic">☰</span>Mais${n?`<span class="badge">${n}</span>`:''}</button>`;
  $('#more-sheet').innerHTML=`<div class="grip"></div><h3>Mais opções</h3>
    <div class="sheet-grid">
      ${MORE_IDS.map(id=>`<button class="sheet-item ${view===id?'on':''}" data-view="${id}"><span class="ic">${EMO[id]}</span>${TITLES[id][0]}${id==='ale'&&n?`<span class="badge">${n}</span>`:''}</button>`).join('')}
      <button class="sheet-item" data-act="theme"><span class="ic">${theme==='light'?'🌙':'☀️'}</span>${theme==='light'?'Modo escuro':'Modo claro'}</button>
    </div>
    <div style="margin-top:14px;font-size:11.5px;color:var(--faint);text-align:center">${logged()?'☁️ '+esc(syncStatusText()):'Dados salvos neste aparelho · faça backup em Ajustes'}</div>`;
}
function openMore(){$('#more-sheet').classList.add('open');$('#more-scrim').classList.add('open');document.body.style.overflow='hidden'}
function closeMore(){$('#more-sheet').classList.remove('open');$('#more-scrim').classList.remove('open');document.body.style.overflow=''}
function render(){
  ensureFixas();
  renderNav();
  const [t,sub]=TITLES[view];
  $('#pg-title').textContent=t; $('#pg-sub').textContent=sub;
  $('#mes-label').textContent=`${MESES[sel.m-1]} ${sel.y}`;
  const anos=new Set([hoje.getFullYear()-1,hoje.getFullYear(),hoje.getFullYear()+1,sel.y]);
  db.receitas.forEach(r=>anos.add(+r.data.slice(0,4))); db.despesas.forEach(d=>anos.add(+d.data.slice(0,4)));
  $('#ano-sel').innerHTML=[...anos].sort().map(a=>`<option ${a===sel.y?'selected':''}>${a}</option>`).join('');
  const V={dash:vDash,rec:vReceitas,des:vDespesas,con:vContas,car:vCartoes,met:vMetas,pla:vPlanejamento,rel:vRelatorios,ale:vAlertas,cfg:vConfig};
  const el=$('#view'); el.innerHTML=V[view]();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.querySelectorAll('svg').forEach(s=>s.parentElement.classList.add('go'));
    el.querySelectorAll('.arc').forEach(a=>a.style.strokeDasharray=a.dataset.len);
    el.querySelectorAll('.meter i').forEach(i=>{i.style.width=i.dataset.w});
  }));
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.id==='sb-pass')adminLogin();
});
document.addEventListener('click',e=>{
  if(e.target.id==='more-scrim'){closeMore();return}
  const nb=e.target.closest('[data-view]'); if(nb){view=nb.dataset.view;closeMore();render();window.scrollTo({top:0});return}
  const b=e.target.closest('[data-act]'); if(!b)return;
  const act=b.dataset.act, id=b.dataset.id;
  if(act==='more'){openMore();return}
  const find=(arr)=>arr.find(x=>x.id===id);
  const del=(arr,msg)=>{const i=arr.findIndex(x=>x.id===id);if(i>=0&&confirm('Excluir este item?')){arr.splice(i,1);save();render();toast(msg)}};
  const delFixavel=(arr,msg)=>{
    const i=arr.findIndex(x=>x.id===id);if(i<0)return;
    const it=arr[i];
    const serie=(it.cat===CAT_FIXA_REC||it.cat===CAT_FIXA_DES)&&!it.fixaDe&&arr.some(x=>x.fixaDe===it.id);
    if(!confirm(serie?'Este é um lançamento FIXO: excluir também todas as repetições já geradas?':'Excluir este item?'))return;
    if(it.fixaDe)db.fixasExcluidas.push(it.fixaDe+'|'+it.data.slice(0,7));
    if(serie)for(let j=arr.length-1;j>=0;j--)if(arr[j].fixaDe===it.id)arr.splice(j,1);
    arr.splice(arr.findIndex(x=>x.id===id),1);save();render();toast(msg);
  };
  switch(act){
    case 'mes-prev':{const t=addMonths(sel.y,sel.m,-1);sel={y:t.y,m:t.m};render();break}
    case 'mes-next':{const t=addMonths(sel.y,sel.m,1);sel={y:t.y,m:t.m};render();break}
    case 'modal-close':closeModal();break;
    case 'rec-new':formReceita();break;
    case 'rec-edit':formReceita(find(db.receitas));break;
    case 'rec-del':delFixavel(db.receitas,'Receita excluída');break;
    case 'tog-rec':{const r=find(db.receitas);r.status=r.status==='Recebido'?'Pendente':'Recebido';save();render();break}
    case 'des-new':formDespesa();break;
    case 'des-edit':formDespesa(find(db.despesas));break;
    case 'des-del':delFixavel(db.despesas,'Despesa excluída');break;
    case 'tog-pago':{const d=find(db.despesas);d.pago=!d.pago;save();render();toast(d.pago?'Marcada como paga':'Marcada como em aberto');break}
    case 'con-new':formConta();break;
    case 'con-edit':formConta(find(db.contas));break;
    case 'con-del':del(db.contas,'Conta excluída');break;
    case 'tr-new':formTransf();break;
    case 'tr-edit':break;
    case 'tr-del':del(db.transfers,'Transferência excluída');break;
    case 'car-new':formCartao();break;
    case 'car-edit':formCartao(find(db.cartoes));break;
    case 'car-del':del(db.cartoes,'Cartão excluído');break;
    case 'met-new':formMeta();break;
    case 'met-edit':formMeta(find(db.metas));break;
    case 'met-del':del(db.metas,'Meta excluída');break;
    case 'met-dep':{const m=find(db.metas);openForm(`Depositar em “${m.nome}”`,[{k:'v',lb:'Valor (R$)',type:'number',min:0}],null,
      o=>{m.guardado=+(m.guardado+o.v).toFixed(2);save();render();
        toast(m.guardado>=m.alvo?'🎉 Meta atingida!':'Depósito registrado')});break}
    case 'lst-add':{const inp=document.querySelector(`[data-lst-input="${b.dataset.key}"]`);const v=inp.value.trim();
      if(v&&!db.listas[b.dataset.key].includes(v)){db.listas[b.dataset.key].push(v);save();render();toast('Adicionado')}break}
    case 'lst-del':{db.listas[b.dataset.key].splice(+b.dataset.i,1);save();render();break}
    case 'sync-login':adminLogin();break;
    case 'sync-now':syncNow(false);break;
    case 'sync-logout':delete sync.space;saveSync();render();toast('Desconectado deste aparelho');break;
    case 'sync-sql-copy':{
      if(navigator.clipboard&&navigator.clipboard.writeText)
        navigator.clipboard.writeText(SYNC_SQL).then(()=>toast('SQL copiado!'),()=>prompt('Copie o SQL:',SYNC_SQL));
      else prompt('Copie o SQL:',SYNC_SQL);
      break}
    case 'exp-json':download('financas-backup.json',JSON.stringify(db,null,2),'application/json');toast('Backup exportado');break;
    case 'imp-json':$('#file-imp').click();break;
    case 'exp-csv':expCSV();toast('CSV exportado');break;
    case 'reset-demo':if(confirm('Carregar dados de exemplo? Eles substituem o que estiver lançado.')){db=seed();save();render();toast('Dados de exemplo restaurados')}break;
    case 'wipe':if(confirm('Apagar TODOS os dados? Essa ação não tem volta.')){
      db=emptyDB();save();render();toast('Dados apagados')}break;
    case 'theme':{const t=document.documentElement.dataset.theme==='light'?'dark':'light';
      document.documentElement.dataset.theme=t;try{localStorage.setItem(THEME_KEY,t)}catch(_){}
      render();break}
  }
});
document.addEventListener('change',e=>{
  if(e.target.id==='ano-sel'){sel.y=+e.target.value;render();return}
  if(e.target.dataset.filtro){const k=e.target.dataset.filtro;
    if(k==='todosMeses'||k==='todosMesesR')filtros[k]=!!e.target.value;else filtros[k]=e.target.value;
    render();return}
  if(e.target.dataset.orc!=null){db.orcamentos[e.target.dataset.orc]=parseFloat(e.target.value)||0;save();
    const foco=e.target.dataset.orc;render();
    document.querySelector(`[data-orc="${CSS.escape(foco)}"]`)?.focus();return}
  if(e.target.id==='file-imp'){const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();rd.onload=()=>{try{const nu=JSON.parse(rd.result);
      if(!nu.receitas||!nu.despesas)throw 0;db=normalize(nu);save();render();toast('Backup importado')}catch(_){toast('Arquivo inválido')}};
    rd.readAsText(f);e.target.value='';}
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
$('#overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal()});
/* tooltip */
const tip=$('#tip');
document.addEventListener('mousemove',e=>{
  const t=e.target.closest?.('[data-tt]');
  if(!t){tip.style.display='none';return}
  const[h,...ls]=t.dataset.tt.split('|');
  tip.innerHTML=`<div style="color:var(--muted);font-size:11px;margin-bottom:2px">${esc(h)}</div>`+ls.map(l=>{
    const i=l.indexOf(':');return `<div>${esc(l.slice(0,i+1))} <b>${esc(l.slice(i+1))}</b></div>`}).join('');
  tip.style.display='block';
  const w=tip.offsetWidth,hh=tip.offsetHeight;
  tip.style.left=Math.min(innerWidth-w-10,e.clientX+14)+'px';
  tip.style.top=Math.max(8,Math.min(innerHeight-hh-10,e.clientY-hh-10))+'px';
});
render();
if(logged())syncNow(true);
let lastFocusPull=0;
addEventListener('focus',()=>{if(logged()&&Date.now()-lastFocusPull>30000){lastFocusPull=Date.now();syncNow(true)}});
})();
</script>
